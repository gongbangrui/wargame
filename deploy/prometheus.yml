global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/wargame-alerts.yml

scrape_configs:
  - job_name: wargame
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - server:9090
        labels:
          service: wargame-server
