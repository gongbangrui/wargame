services:
  server:
    image: ${WARGAME_SERVER_IMAGE:-ghcr.io/your-org/wargame-server}:${WARGAME_VERSION}
    restart: unless-stopped
    read_only: true
    environment:
      WARGAME_TOKEN_PEPPER: ${WARGAME_TOKEN_PEPPER}
    command: ["--config", "/app/config/server.json"]
    volumes:
      - ./server.prod.json:/app/config/server.json:ro
      - ./data:/app/data
      - ./logs:/app/logs
    expose:
      - "8080"
      - "9090"
      - "9091"
    healthcheck:
      test: ["CMD", "/app/bin/wargame_server", "--health-probe", "http://127.0.0.1:9090/healthz"]
      interval: 15s
      timeout: 3s
      retries: 4
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=16m,noexec,nosuid
    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"

  caddy:
    image: caddy:2.10
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      WARGAME_PUBLIC_HOST: ${WARGAME_PUBLIC_HOST}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
